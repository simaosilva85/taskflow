# Décrit les deux briques de l'application : le serveur web et sa base de données.
# Coolify sait déployer directement un projet à partir de ce fichier.

services:
  app:
    build: .
    restart: unless-stopped
    environment:
      PORT: 3000
      PGHOST: db
      PGPORT: 5432
      PGUSER: ${PGUSER:-taskflow}
      PGPASSWORD: ${PGPASSWORD:-taskflow}
      PGDATABASE: ${PGDATABASE:-taskflow}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGUSER:-taskflow}
      POSTGRES_PASSWORD: ${PGPASSWORD:-taskflow}
      POSTGRES_DB: ${PGDATABASE:-taskflow}
    volumes:
      # Persistance : les données survivent aux redémarrages et redéploiements.
      - taskflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-taskflow} -d ${PGDATABASE:-taskflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  taskflow_data:
